# Add one entry per calendar you want on the dashboard.
#
# To get an embed_url without making the calendar public:
#   Google Calendar > Settings > pick the calendar under "Settings for my
#   calendars" > under "Share with specific people or groups" click
#   "Add people and groups" > share it with your own Google account email >
#   scroll to "Integrate calendar" > copy the src from the "Embed code" iframe.
# Anyone who opens this dashboard without being signed into that Google
# account just sees a blank/permission box, not your events. Do NOT use
# "Make available to public" - that makes the calendar visible to anyone
# with the link, not just you.
#
# Tip: subscribe your Outlook and iCloud calendars INTO this Google calendar
# (Google Calendar > Other calendars > + > From URL) and they show up here
# automatically - no need to add separate entries.
#
# Calendars are tinted in this fixed order automatically - no color to set.
- name: "My Calendar"
  embed_url: "https://calendar.google.com/calendar/embed?src=chanderroopa%40gmail.com&ctz=America%2FChicago"
