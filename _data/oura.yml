# These tiles show "—" until YOU connect your live Oura in this browser
# (Connect Oura button on the page). No personal numbers are stored here, so
# nothing about your health is committed to the public repo. good / warn are
# generic 0-100 thresholds Oura uses to color a metric; set lower_is_better
# for metrics where a smaller number is better; ring draws the progress ring.
metrics:
  - label: "Sleep Score"
    value: "—"
    unit: ""
    good: 85
    warn: 60
    ring: true
  - label: "Readiness"
    value: "—"
    unit: ""
    good: 85
    warn: 60
    ring: true
  - label: "Activity"
    value: "—"
    unit: ""
    good: 85
    warn: 60
    ring: true
  - label: "HRV"
    value: "—"
    unit: "ms"
    good: 45
    warn: 30
  - label: "Resting HR"
    value: "—"
    unit: "bpm"
    good: 60
    warn: 70
    lower_is_better: true
  - label: "Total Sleep"
    value: "—"
    unit: "hrs"
    good: 7
    warn: 6
  - label: "Stress"
    value: "—"
    unit: ""
