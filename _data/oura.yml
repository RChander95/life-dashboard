# These are the FALLBACK numbers shown before you connect the live Oura
# proxy (see cloudflare-worker/README.md). Once connected, live values from
# your ring replace them automatically. You can still edit them by hand if
# you prefer not to run the proxy.
# good / warn are the score thresholds Oura itself uses to color a metric
# green / yellow / red. Set lower_is_better: true for metrics where a smaller
# number is the good outcome (resting heart rate). Set ring: true to draw the
# little progress ring (only makes sense for the 0-100 score metrics).
